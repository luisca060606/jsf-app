<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <f:facet name="first">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="apple-mobile-web-app-capable" content="yes"/>
    </f:facet>
    <title>Mi Sistema - Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/primeicons/6.0.1/primeicons.min.css"/>
    
    <style>
        body { margin: 0; }
        .main-content { min-height: calc(100vh - 70px); }
    </style>
</h:head>

<h:body class="surface-ground">

    <div class="flex align-items-center justify-content-between px-4 py-3 shadow-2 surface-card sticky top-0 z-5">
        <div class="flex align-items-center">
            <p:commandButton icon="pi pi-bars" type="button" 
                             onclick="PF('sidebarVar').show()" 
                             styleClass="p-button-text p-button-rounded mr-2 md:hidden" />
            
            <span class="text-xl font-bold text-900">USERS SYSTEM</span>
        </div>
        
        <div>
          <h:form id="formLogout">
            <p:commandButton
              value="Logout"
              icon="pi pi-sign-out"
              action="#{authBean.logout}"
              ajax="false"
              styleClass="p-button-text p-button-danger"/>
          </h:form>
        </div>
    </div>

    <div class="flex">

        <div class="surface-card shadow-2 p-3 hidden md:block" style="width:280px; min-height:calc(100vh - 70px);">
            <h:form>
                <ui:include src="/WEB-INF/templates/menu_content.xhtml" />
            </h:form>
        </div>

        <p:sidebar widgetVar="sidebarVar" styleClass="w-full sm:w-20rem">
            <h2 class="text-xl font-bold p-3">Menú</h2>
            <h:form>
                <ui:include src="/WEB-INF/templates/menu_content.xhtml" />
            </h:form>
        </p:sidebar>

        <div class="flex-auto p-2 md:p-4 overflow-x-hidden">
            <ui:insert name="content"/>
        </div>

    </div>

</h:body>
</html>
